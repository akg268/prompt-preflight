name: Prompt Preflight Benchmark

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  vague-prompts:
    name: expanded vague prompts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests
        run: python3 -m unittest discover -s tests -q

      - name: Check docs synchronization
        run: python3 scripts/generate_template_docs.py --check

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install VS Code extension dependencies
        run: npm ci
        working-directory: vscode-extension

      - name: Run VS Code extension tests
        run: npm test
        working-directory: vscode-extension

      - name: Smoke-test unified installer dry run
        run: python3 scripts/install_prompt_preflight.py --dry-run --skip-codex-add

      - name: Smoke-test installer dry run
        run: python3 scripts/install_codex_plugin.py --dry-run --skip-codex-add

      - name: Smoke-test Claude installer dry run
        run: python3 scripts/install_claude_plugin.py --dry-run

      - name: Smoke-test Kiro installer dry run
        run: python3 scripts/install_kiro_hook.py --dry-run

      - name: Run vague-prompt benchmark
        run: >
          python3 scripts/benchmark_vague_prompts.py
          --min-block-rate 0.90
          --json-output benchmark-results.json

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prompt-preflight-benchmark
          path: benchmark-results.json
          if-no-files-found: ignore
